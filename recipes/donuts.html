    <h1  class="RecipeTitle">Donuts</h1>
    <figure>
      <img
      class="recipePageImage"
        src="../assets/donuts/donuts-title.gif"
        alt="Delicious glazed donuts"
      />

      <p>
        Nothing beats the satisfying "crunch" of a fresh donut meeting a thick coat of sparkling sugar, revealing a center as soft as a Ghibli dream. These golden rings of joy are worth every minute of proofing time, especially when they come out of the oil warm, puffy, and ready to devour.
      </p>
      <br>
      <hr>
      <h2 class="sectionTitle">Ingredients</h2>
      <h3>The Yeast Mixture:</h3>
      <ol class="ingedientsList">
        <li><strong>2 1/4 tsp</strong> Active dry yeast (1 packet)</li>
        <li><strong>2 tbsp</strong> Warm water (around 38°C)</li>
        <li><strong>3/4 cup</strong> Warm milk</li>
      </ol>
      <h3>The dough:</h3>
      <ol>
        <li><strong>2 1/2 cups</strong>All-purpose flour</li>
        <li><strong>1/4 cup</strong> Sugar</li>
        <li><strong>1/2 tsp</strong> Salt</li>
        <li><strong>1</strong> Large egg, beaten</li>
        <li><strong>3 tbsp</strong> Butter, melted and cooled</li>
        <li><strong>1 liter</strong> Vegetable oil (for frying)</li>
      </ol>

      <hr>
      <br>

      <h2 class="sectionTitle">Instructions</h2>
      <h3>Step 1: The Rise</h3>
      <ol>
        <li>In a small bowl, combine the warm water, warm milk, and yeast. Let it sit for about 5 minutes until it becomes foamy and bubbly.</li>
        <li>In a large bowl, whisk the flour, sugar, and salt. Pour in the yeast mixture, egg, and melted butter. Stir until a soft dough forms.</li>
         <figure>
        <img
          class="recipePageImage"
          src="../assets/donuts/donut-mix-dry.webp"
          alt="Mix all the dry ingredients together"

        />
        <figcaption><em>Whisking the dry ingredients together</em></figcaption>
      </figure>
        <li>Turn the dough onto a floured surface and knead for 5-8 minutes until smooth and elastic.</li>
        
        <li>Place the dough in a greased bowl, cover with a damp cloth, and let it rise in a warm spot for 1 hour or until it has doubled in size.</li>
      </ol>
      <h3>Step 2: Shaping the Rings</h3>
      <ol>
        <li>Punch the dough down to release air. Roll it out on a floured surface to about 1.5 cm thickness.</li>
        <li>Use a donut cutter (or a glass and a bottle cap) to cut out your circles and holes.</li>
         <figure>
        <img
          class="recipePageImage"
          src="../assets/donuts//making donut shape.webp"
          alt="Shaping the donuts into rings by hand or with a cutter"
        
        />
        <figcaption><em>Shaping the donuts into rings</em></figcaption>
      </figure>
        <li>Place the cut donuts on a parchment-lined tray, cover, and let them rise again for 30 minutes. They should look puffy and delicate.</li>
         <figure>
        <img
          class="recipePageImage"
          src="../assets/donuts/donut-resting-dough.webp"
          alt="Donuts resting after shaping, ready for the second rise"

        />
        <figcaption><em>Donuts resting after shaping</em></figcaption>
      </figure>
      </ol>
      <h3>Step 3: The Fry</h3>
      <ol>
        <li>Fill a heavy-bottomed pot with oil and heat it to 175°C.</li>
        <li>Gently drop 2-3 donuts into the oil at a time. </li>
         <figure>
        <img
           class="recipePageImage"
          src="../assets/donuts/donuts-add donuts to oil.gif"
          alt="Adding donuts to hot oil for frying"
        />
        <figcaption><em>Adding donuts to hot oil for frying</em></figcaption>
      </figure>
      <li>Fry for about 60-90 seconds per side until they are a deep golden brown.</li>
       <figure>
        <img
          class="recipePageImage"
          src="../assets/donuts/donut-flip.gif"
          alt="Flipping donuts in the oil"
        />
        <figcaption><em>Flipping donuts in the oil</em></figcaption>
      </figure>
        <li>Use a slotted spoon to remove the donuts and place them on paper towels to drain excess oil.</li>
      </ol>
      <h3>Step 4: The Finishing Touch</h3>
      <ol>
        <li>While the donuts are still hot, toss them in a bowl of granulated sugar or cinnamon-sugar.</li>
        <li>These are best enjoyed immediately while the center is still warm and fluffy.</li>
         <figure>
        <img
          class="recipePageImage"
          src="../assets/donuts/donuts-final.gif"
          alt="Final glazed donuts ready to eat"
        />
        <figcaption><em>Final glazed donuts ready to eat</em></figcaption>
      </figure>
      </ol>
